    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 15px; background-color: #f4f7f6; margin: 0; }
        .header { background-color: #2e7d32; color: white; text-align: center; padding: 25px 15px; border-radius: 12px; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 26px; }
        .header p { margin: 8px 0 0 0; font-size: 14px; opacity: 0.9; }
        .search-box { width: 100%; max-width: 500px; padding: 12px; margin: 0 auto 20px auto; display: block; border: 2px solid #2e7d32; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .product-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 600px) { .product-grid { grid-template-columns: 1fr 1fr; } }
        @media(min-width: 900px) { .product-grid { grid-template-columns: 1fr 1fr 1fr; } }
        .product-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 6px solid #ff9933; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .product-img { width: 100%; max-width: 160px; height: 160px; object-fit: contain; border-radius: 8px; margin-bottom: 12px; }
        .product-name { font-size: 16px; font-weight: bold; color: #333; margin: 8px 0; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .category { font-size: 11px; background: #fff3e0; color: #e65100; padding: 4px 12px; border-radius: 20px; display: inline-block; font-weight: bold; }
        .price { font-size: 18px; color: #d32f2f; font-weight: bold; margin: 6px 0; }
        .item-code { font-size: 11px; color: #777; margin-bottom: 8px; }
        .whatsapp-btn { background-color: #25d366; color: white; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; margin-top: 10px; width: 85%; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .whatsapp-btn:hover { background-color: #128c7e; }
    </style>
</head>

        function getProductImage(id) {
            if(id === "180031035") return "phc006.webp";
            if(id === "180002957") return "ghee200ml2(2)_1739246972.webp";
            return id + ".webp"; 
        }

        function displayProducts(productsList) {
            const container = document.getElementById('productContainer');
            container.innerHTML = '';
            
            productsList.forEach(p => {
                const imgUrl = getProductImage(p.id);
                const waText = encodeURIComponent(`नमस्ते भारतीय आरोग्य केंद्र, मुझे यह सामान ऑर्डर करना है:\nसामान का नाम: पतंजलि ${p.name}\nवजन: ${p.weight}\nरेट: ₹${p.mrp}`);
                const waLink = `https://wa.me/918010291813?text=${waText}`;

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${imgUrl}" class="product-img" onerror="this.src='https://placehold.co/160x160/f5f5f5/888888?text=Patanjali'">
                    <div>
                        <div class="category">${p.cat}</div>
                        <div class="product-name">पतंजलि ${p.name} (${p.weight})</div>
                        <div class="price">एमआरपी: ₹${p.mrp}</div>
                        <div class="item-code">कोड: ${p.id}</div>
                        <a href="${waLink}" target="_blank" class="whatsapp-btn">
                            🟢 WhatsApp ऑर्डर करें
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function searchProducts() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query) || p.cat.toLowerCase().includes(query));
            displayProducts(filtered);
        }

        displayProducts(products);
    </script>
